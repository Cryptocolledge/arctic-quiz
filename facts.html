<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>🌍 Факты</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#020b18;--ice:#4fdfff;--eco:#61ffb2;--gold:#ffd84d;--purple:#a78bfa;--red:#ff5f7a;--txt:#dff0ff;--muted:rgba(180,220,255,.42);--FH:'Unbounded',sans-serif;--FB:'Nunito',sans-serif;}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--FB);background:var(--bg);color:var(--txt);}
#bgC{position:fixed;inset:0;z-index:0;pointer-events:none;}
#app{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;}

/* TOP BAR */
.topbar{display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:rgba(2,9,24,.97);border-bottom:1px solid rgba(79,223,255,.1);flex-shrink:0;}
.back-btn{background:none;border:1px solid rgba(255,255,255,.1);color:var(--muted);
  border-radius:9px;padding:7px 13px;cursor:pointer;font-size:.76rem;font-family:var(--FB);
  font-weight:700;transition:all .2s;}
.back-btn:hover{border-color:var(--ice);color:var(--ice);}
.topbar-title{font-family:var(--FH);font-size:.9rem;font-weight:900;flex:1;text-align:center;
  background:linear-gradient(135deg,#4fdfff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.tab-row{display:flex;gap:6px;}
.tab{padding:7px 13px;border-radius:9px;border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);cursor:pointer;font-size:.72rem;font-weight:700;
  color:var(--muted);transition:all .2s;font-family:var(--FB);}
.tab.ta{border-color:var(--ice);color:var(--ice);background:rgba(79,223,255,.1);}
.tab.te{border-color:var(--eco);color:var(--eco);background:rgba(97,255,178,.08);}

/* SCROLL AREA */
.scroll{flex:1;overflow-y:auto;padding:16px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.06) transparent;}

/* CATEGORY ROW */
.cat-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.cat-label{font-size:.62rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.cat-line{flex:1;height:1px;background:rgba(255,255,255,.06);}
.cat-ico{font-size:1.2rem;}

/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:28px;}

/* FACT CARD */
.fcard{background:rgba(5,18,42,.92);border:1px solid rgba(79,223,255,.1);border-radius:18px;
  overflow:hidden;cursor:pointer;transition:all .25s;}
.fcard:hover{border-color:rgba(79,223,255,.36);transform:translateY(-4px);box-shadow:0 16px 44px rgba(0,0,0,.55);}
.fcard.eco-card:hover{border-color:rgba(97,255,178,.32);}

/* CARD IMAGE */
.fcard-img{width:100%;height:140px;object-fit:cover;display:block;background:rgba(8,24,54,.8);}
.fcard-img-wrap{position:relative;height:140px;overflow:hidden;background:rgba(8,24,54,.8);}
.fcard-img-wrap .canvas-art{width:100%;height:100%;display:block;}
.fcard-img-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(2,9,24,.9));}
.fcard-ico{position:absolute;bottom:10px;left:12px;font-size:1.8rem;z-index:1;}

/* CARD BODY */
.fcard-body{padding:13px 14px 14px;}
.fcard-tag{font-size:.58rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  padding:2px 8px;border-radius:4px;width:fit-content;margin-bottom:7px;}
.fcard-tag.ti{background:rgba(79,223,255,.1);border:1px solid rgba(79,223,255,.25);color:var(--ice);}
.fcard-tag.te{background:rgba(97,255,178,.08);border:1px solid rgba(97,255,178,.22);color:var(--eco);}
.fcard-tag.tg{background:rgba(255,216,77,.08);border:1px solid rgba(255,216,77,.22);color:var(--gold);}
.fcard-tag.tp{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.22);color:var(--purple);}
.fcard-tag.tr{background:rgba(255,95,122,.08);border:1px solid rgba(255,95,122,.22);color:var(--red);}
.fcard-title{font-size:.92rem;font-weight:800;line-height:1.35;margin-bottom:6px;}
.fcard-text{font-size:.76rem;color:var(--muted);line-height:1.65;}
.fcard-source{font-size:.62rem;color:rgba(255,255,255,.2);margin-top:8px;}

/* MODAL */
.modal-ov{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.84);backdrop-filter:blur(12px);padding:14px;}
.modal-ov.off{display:none!important;}
.modal-box{background:rgba(3,14,38,.99);border:1px solid rgba(79,223,255,.2);border-radius:24px;
  width:min(640px,100%);max-height:88vh;overflow-y:auto;
  box-shadow:0 40px 100px rgba(0,0,0,.9);animation:popIn .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.86);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-img-wrap{position:relative;height:200px;overflow:hidden;border-radius:24px 24px 0 0;background:rgba(8,24,54,.9);}
.modal-img-wrap canvas{width:100%;height:100%;display:block;}
.modal-img-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(3,14,38,.95));}
.modal-body{padding:22px 24px 26px;}
.modal-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.modal-title{font-family:var(--FH);font-size:1.15rem;font-weight:900;line-height:1.3;margin-bottom:14px;}
.modal-text{font-size:.85rem;line-height:1.75;color:var(--txt);}
.modal-text p{margin-bottom:12px;}
.modal-text strong{color:var(--ice);}
.modal-facts{margin-top:16px;display:flex;flex-direction:column;gap:8px;}
.mfact{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;
  border-radius:11px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);}
.mfact-ico{font-size:1.1rem;flex-shrink:0;margin-top:1px;}
.mfact-txt{font-size:.8rem;line-height:1.6;color:var(--muted);}
.modal-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.14);border-radius:9px;color:rgba(255,255,255,.6);
  font-size:.8rem;padding:6px 12px;cursor:pointer;font-family:var(--FB);font-weight:700;z-index:10;}
.modal-close:hover{background:rgba(255,95,122,.2);border-color:rgba(255,95,122,.4);color:var(--red);}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:18px;}
.search-inp{width:100%;padding:10px 14px 10px 38px;border-radius:12px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  color:var(--txt);font-family:var(--FB);font-size:.85rem;outline:none;transition:all .2s;}
.search-inp:focus{border-color:rgba(79,223,255,.4);background:rgba(79,223,255,.05);}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:.9rem;pointer-events:none;}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:99px;}
</style>
</head>
<body>
<canvas id="bgC"></canvas>
<div id="app">
  <div class="topbar">
    <button class="back-btn" onclick="doClose()">← Назад</button>
    <div class="topbar-title">📚 Интересные факты</div>
    <div class="tab-row">
      <div class="tab ta" id="tabA" onclick="setTab('arctic')">🧊</div>
      <div class="tab" id="tabE" onclick="setTab('ecology')">🌿</div>
    </div>
  </div>
  <div class="scroll" id="scroll">
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input class="search-inp" id="searchInp" placeholder="Поиск по фактам…" oninput="filterFacts(this.value)">
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-ov off" id="modal">
  <div class="modal-box" id="mbox" style="position:relative">
    <button class="modal-close" onclick="closeModal()">✕ Закрыть</button>
    <div class="modal-img-wrap"><canvas id="mCanvas"></canvas><div class="modal-img-overlay"></div></div>
    <div class="modal-body">
      <div class="modal-tags" id="mTags"></div>
      <div class="modal-title" id="mTitle"></div>
      <div class="modal-text" id="mText"></div>
      <div class="modal-facts" id="mFacts"></div>
    </div>
  </div>
</div>

<script>
// ── AURORA ──
(()=>{const c=document.getElementById('bgC');const ctx=c.getContext('2d');let t=0;
const r=()=>{c.width=innerWidth;c.height=innerHeight;};r();window.addEventListener('resize',r);
const d=()=>{ctx.clearRect(0,0,c.width,c.height);
for(let i=0;i<3;i++){const yb=c.height*(.15+i*.09)+Math.sin(t*.28+i*2)*c.height*.06;
const g=ctx.createLinearGradient(0,yb-80,0,yb+80);const h=[185,155,270][i];
g.addColorStop(0,'transparent');g.addColorStop(.5,`hsla(${h},80%,60%,.052)`);g.addColorStop(1,'transparent');
ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(0,yb);
for(let x=0;x<=c.width;x+=18)ctx.lineTo(x,yb+Math.sin((x/c.width)*Math.PI*4+t*.5+i)*22);
ctx.lineTo(c.width,c.height);ctx.lineTo(0,c.height);ctx.closePath();ctx.fill();}
ctx.fillStyle='rgba(210,235,255,.42)';
for(let i=0;i<90;i++){const sx=(Math.sin(i*137.508)*.5+.5)*c.width;const sy=(Math.sin(i*97.3)*.5+.5)*c.height*.6;const r=.3+Math.sin(t*1.4+i)*.25;ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();}
t+=.009;requestAnimationFrame(d);};d();})();

// ── GENERATIVE ART for card images ──
// Each fact has a unique visual generated on canvas
function drawArt(canvas, artType, colors, t=0){
  const ctx=canvas.getContext('2d');
  const W=canvas.width||300, H=canvas.height||140;
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,colors[0]); bg.addColorStop(1,colors[1]);
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  if(artType==='aurora'){
    for(let i=0;i<3;i++){
      const yb=H*(.3+i*.2)+Math.sin(i*2.1)*H*.1;
      const g=ctx.createLinearGradient(0,yb-40,0,yb+40);
      g.addColorStop(0,'transparent'); g.addColorStop(.5,`hsla(${185+i*30},85%,65%,.28)`); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(0,yb);
      for(let x=0;x<=W;x+=12)ctx.lineTo(x,yb+Math.sin(x/W*Math.PI*4+i)*20);
      ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
    }
    for(let i=0;i<50;i++){const sx=(Math.sin(i*137.5)*.5+.5)*W;const sy=(Math.sin(i*97.3)*.5+.5)*H*.7;ctx.fillStyle='rgba(220,240,255,.6)';ctx.beginPath();ctx.arc(sx,sy,.8+Math.random()*.6,0,Math.PI*2);ctx.fill();}
  } else if(artType==='ice'){
    ctx.strokeStyle='rgba(79,223,255,.25)';ctx.lineWidth=1.2;
    for(let i=0;i<6;i++){const cx=W*.2+i*(W*.14),cy=H*.5;
      for(let a=0;a<6;a++){const ang=a*Math.PI/3;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(ang)*28,cy+Math.sin(ang)*28);ctx.stroke();}
      ctx.beginPath();ctx.arc(cx,cy,6,0,Math.PI*2);ctx.fillStyle='rgba(79,223,255,.18)';ctx.fill();}
  } else if(artType==='forest'){
    for(let i=0;i<8;i++){const tx=i*(W/7);ctx.fillStyle=`rgba(${50+i*8},${180+i*5},${80+i*4},.${18+i*2})`;ctx.beginPath();ctx.moveTo(tx,H);ctx.lineTo(tx+22,H*.3);ctx.lineTo(tx+44,H);ctx.closePath();ctx.fill();}
  } else if(artType==='ocean'){
    for(let i=0;i<5;i++){const g=ctx.createLinearGradient(0,H*(.3+i*.14),0,H*(.4+i*.14));g.addColorStop(0,'transparent');g.addColorStop(.5,`rgba(97,255,178,.${8+i*3})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(0,H*(.35+i*.14));for(let x=0;x<=W;x+=14)ctx.lineTo(x,H*(.35+i*.14)+Math.sin(x/W*Math.PI*5+i)*12);ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();}
  } else if(artType==='polar'){
    // Bear silhouette approximation
    ctx.fillStyle='rgba(255,255,255,.1)';ctx.beginPath();ctx.ellipse(W*.5,H*.6,50,35,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(W*.5,H*.32,20,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(W*.37,H*.22,8,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(W*.63,H*.22,8,0,Math.PI*2);ctx.fill();
  } else if(artType==='climate'){
    // Thermometer + sun
    const grd=ctx.createRadialGradient(W*.7,H*.35,5,W*.7,H*.35,55);grd.addColorStop(0,'rgba(255,200,50,.28)');grd.addColorStop(1,'transparent');ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(255,150,50,.35)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(W*.7,H*.35,30,0,Math.PI*2);ctx.stroke();
    for(let i=0;i<8;i++){const a=i*Math.PI/4;ctx.beginPath();ctx.moveTo(W*.7+Math.cos(a)*36,H*.35+Math.sin(a)*36);ctx.lineTo(W*.7+Math.cos(a)*46,H*.35+Math.sin(a)*46);ctx.stroke();}
  } else if(artType==='whale'){
    ctx.fillStyle='rgba(79,180,255,.18)';ctx.beginPath();ctx.ellipse(W*.5,H*.62,85,30,0.1,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(W*.72,H*.62);ctx.quadraticCurveTo(W*.85,H*.44,W*.8,H*.38);ctx.quadraticCurveTo(W*.9,H*.5,W*.78,H*.56);ctx.fill();
  } else {
    // Generic: dots
    for(let i=0;i<40;i++){ctx.fillStyle=`rgba(${Math.random()*100+155},${Math.random()*100+155},255,.1)`;ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,2+Math.random()*8,0,Math.PI*2);ctx.fill();}
  }
}

// ── DATA ──
const FACTS={
arctic:[
  {cat:'🌍 География',id:'a1',
   img:'https://images.unsplash.com/photo-1551415923-a2297c7fda79?w=600&q=80',tag:'ti',title:'Арктика — крыша планеты',emoji:'🧊',artType:'aurora',colors:['#020e2a','#051838'],
   short:'Арктика охватывает около 14,5 млн км² — почти полтора материка.',
   text:'<p>Арктика — полярная область Земли вокруг Северного полюса. Она охватывает Северный Ледовитый океан, его острова и прибрежные территории. Площадь — около <strong>14,5 млн км²</strong>.</p><p>В отличие от Антарктиды, Арктика — это в основном <strong>океан, покрытый льдом</strong>, а не континент. Средняя толщина морского льда — около 2–3 метров.</p>',
   facts:['🌡️ Средняя зимняя температура от -30 до -40°C','📏 Морской лёд тает каждое лето и восстанавливается зимой','🗺️ В Арктике нет земли — только лёд над океаном']},
  {cat:'🌍 География',id:'a2',
   img:'https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=600&q=80',tag:'ti',title:'Полярная ночь и день',emoji:'🌑',artType:'aurora',colors:['#01081c','#040d28'],
   short:'На полюсе день и ночь длятся по 6 месяцев каждый.',
   text:'<p>В высоких широтах существуют полярные день и ночь — уникальное явление, определяющее жизнь арктических организмов и народов.</p><p><strong>Полярный день</strong> на Северном полюсе длится с марта по сентябрь, <strong>полярная ночь</strong> — с сентября по март. На Мурманске, например, ночь длится 40 дней.</p>',
   facts:['🌅 На широте 66° (полярный круг) оба явления длятся ровно 1 сутки','⚡ Полярное сияние видно только в полярную ночь','🦅 Перелётные птицы используют длинный полярный день для гнездовья']},
  {cat:'🐻 Живой мир',id:'a3',
   img:'https://images.unsplash.com/photo-1589656966895-2f33e7653819?w=600&q=80',tag:'tg',title:'Белый медведь — хозяин Арктики',emoji:'🐻‍❄️',artType:'polar',colors:['#04101e','#08182e'],
   short:'Крупнейший наземный хищник планеты живёт только в Арктике.',
   text:'<p>Белый медведь (<em>Ursus maritimus</em>) — главный символ Арктики. Самцы весят 400–700 кг, длина до 3 метров. Официально их в мире около <strong>26 000 особей</strong>.</p><p>Мех белого медведя прозрачный, а кожа — чёрная для поглощения тепла. Под шерстью — слой жира до 10 см. Они могут плыть без остановки более <strong>60 км</strong>.</p>',
   facts:['🐾 Лапа медведя — до 30 см в диаметре, как снегоступ','🍣 Основная еда — кольчатые нерпы','⚠️ Вид уязвим: таяние льдов сокращает места охоты']},
  {cat:'🐻 Живой мир',id:'a4',
   img:'https://images.unsplash.com/photo-1534361960057-19f4434c7f5e?w=600&q=80',tag:'tg',title:'Нарвал — единорог океана',emoji:'🦄',artType:'ocean',colors:['#020c1e','#041428'],
   short:'Бивень нарвала вырастает до 3 метров — это спиральный зуб.',
   text:'<p>Нарвал (<em>Monodon monoceros</em>) — удивительное арктическое животное. Его «бивень» — это левый верхний зуб, вырастающий у самцов в длинный спиральный отросток до <strong>3 м</strong>.</p><p>Учёные выяснили, что бивень пронизан нервными окончаниями и служит <strong>чувствительным органом</strong> — нарвал ощущает давление, температуру и соленость воды.</p>',
   facts:['📡 Нарвалы ныряют на глубину до 1500 м','🌊 Живут стаями по 10–100 особей','❄️ Зимуют подо льдом, дышат через трещины']},
  {cat:'🔬 Наука',id:'a5',
   img:'https://images.unsplash.com/photo-1478719059408-592965723cbc?w=600&q=80',tag:'tp',title:'Вечная мерзлота — гигантский архив',emoji:'🧊',artType:'ice',colors:['#050e20','#0a1830'],
   short:'В вечной мерзлоте «законсервированы» организмы возрастом 40 000 лет.',
   text:'<p>Пермафрост — слой горных пород, постоянно находящийся ниже 0°C. Занимает около <strong>25% суши</strong> Земли. Глубина — от нескольких метров до 1,5 км.</p><p>В нём найдены: шерстистые мамонты, волки, пещерные медведи, спящие бактерии. Эти микроорганизмы «просыпались» и оживали после 40 000 лет заморозки.</p>',
   facts:['🌡️ При таянии выделяется метан — парниковый газ ×80 сильнее CO₂','🦣 Найдено более 40 мамонтов с сохранённой шерстью и мясом','⏱️ Некоторые слои мерзлоты не таяли 3 млн лет']},
  {cat:'🔬 Наука',id:'a6',
   img:'https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=600&q=80',tag:'tp',title:'Северное сияние — физика в небе',emoji:'🌌',artType:'aurora',colors:['#010b1e','#030e22'],

// ── STATE ──
let activeTab='arctic', activeSearch='', allCards=[];

function setTab(t){
  activeTab=t;
  document.getElementById('tabA').className='tab'+(t==='arctic'?' ta':'');
  document.getElementById('tabE').className='tab'+(t==='ecology'?' te':'');
  document.getElementById('searchInp').value='';
  activeSearch='';
  render();
}
function filterFacts(v){activeSearch=v.toLowerCase();render();}

function render(){
  const data=FACTS[activeTab];
  const cats={};
  data.forEach(f=>{
    const txt=(f.title+f.short+(f.text||'')).toLowerCase();
    if(activeSearch&&!txt.includes(activeSearch))return;
    if(!cats[f.cat])cats[f.cat]=[];
    cats[f.cat].push(f);
  });
  const cont=document.getElementById('content');
  if(Object.keys(cats).length===0){cont.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);font-size:.85rem;">Ничего не найдено 🔍</div>';return;}
  cont.innerHTML='';
  Object.entries(cats).forEach(([cat,facts])=>{
    const catDiv=document.createElement('div');
    const parts=cat.split(' ');
    catDiv.innerHTML=`<div class="cat-row"><div class="cat-ico">${parts[0]}</div><div class="cat-label">${parts.slice(1).join(' ')}</div><div class="cat-line"></div></div>`;
    const grid=document.createElement('div'); grid.className='cards-grid';
    facts.forEach(f=>{
      const card=document.createElement('div');
      card.className='fcard'+(activeTab==='ecology'?' eco-card':'');
      const imgHTML = f.img
        ? `<img class="fcard-img" src="${f.img}" alt="${f.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">`
          + `<canvas class="canvas-art" width="300" height="140" data-art="${f.artType}" data-c0="${f.colors[0]}" data-c1="${f.colors[1]}" style="display:none"></canvas>`
        : `<canvas class="canvas-art" width="300" height="140" data-art="${f.artType}" data-c0="${f.colors[0]}" data-c1="${f.colors[1]}"></canvas>`;
      card.innerHTML=`
        <div class="fcard-img-wrap">
          ${imgHTML}
          <div class="fcard-img-overlay"></div>
          <div class="fcard-ico">${f.emoji}</div>
        </div>
        <div class="fcard-body">
          <div class="fcard-tag ${f.tag}">${f.cat.split(' ').slice(0,2).join(' ')}</div>
          <div class="fcard-title">${f.title}</div>
          <div class="fcard-text">${f.short}</div>
        </div>`;
      card.onclick=()=>openModal(f);
      grid.appendChild(card);
    });
    catDiv.appendChild(grid);
    cont.appendChild(catDiv);
  });
  // draw card arts
  document.querySelectorAll('.canvas-art').forEach(c=>{drawArt(c,c.dataset.art,[c.dataset.c0,c.dataset.c1]);});
}

function openModal(f){
  document.getElementById('mTags').innerHTML=`<div class="fcard-tag ${f.tag}">${f.cat}</div>`;
  document.getElementById('mTitle').textContent=f.title;
  document.getElementById('mText').innerHTML=f.text||'';
  const mf=document.getElementById('mFacts');
  mf.innerHTML=(f.facts||[]).map(ft=>`<div class="mfact"><div class="mfact-ico">${ft.split(' ')[0]}</div><div class="mfact-txt">${ft.split(' ').slice(1).join(' ')}</div></div>`).join('');
  const mc=document.getElementById('mCanvas'); mc.width=640; mc.height=200;
  if(f.img){
    // Show real photo in modal
    const mwrap=mc.parentElement;
    let mimg=mwrap.querySelector('.modal-real-img');
    if(!mimg){mimg=document.createElement('img');mimg.className='modal-real-img';mimg.style.cssText='width:100%;height:200px;object-fit:cover;border-radius:12px;display:block;';mwrap.insertBefore(mimg,mc);}
    mimg.src=f.img; mimg.alt=f.title;
    mc.style.display='none'; mimg.style.display='block';
    mimg.onerror=()=>{mimg.style.display='none';mc.style.display='block';drawArt(mc,f.artType,f.colors);};
  } else {
    const mimg2=mc.parentElement?.querySelector('.modal-real-img');
    if(mimg2)mimg2.style.display='none';
    mc.style.display='block';
    drawArt(mc,f.artType,f.colors);
  }
  document.getElementById('modal').classList.remove('off');
  document.getElementById('scroll').style.overflow='hidden';
}
function closeModal(){document.getElementById('modal').classList.add('off');document.getElementById('scroll').style.overflow='';}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function doClose(){if(window.parent&&window.parent!==window)window.parent.postMessage('facts:close','*');else window.location.href='hub.html';}

// ── INIT ──
render();
</script>
