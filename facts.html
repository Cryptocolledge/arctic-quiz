<head>

<title>📚 Факты — QuizHub</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#020b18;--s1:rgba(5,18,42,.96);--ice:#4fdfff;--eco:#61ffb2;--gold:#ffd84d;
  --txt:#dff0ff;--muted:rgba(180,220,255,.45);--FH:'Unbounded',sans-serif;--FB:'Nunito',sans-serif;
}
html,body{min-height:100%;font-family:var(--FB);background:var(--bg);color:var(--txt);}
canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:50;background:rgba(2,9,24,.96);backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(79,223,255,.1);padding:12px 20px;
  display:flex;align-items:center;gap:14px;}
.back-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;
  padding:7px 14px;color:var(--muted);font-size:.78rem;font-family:var(--FB);font-weight:700;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
.back-btn:hover{border-color:rgba(79,223,255,.35);color:var(--ice);}
.hdr-title{font-family:var(--FH);font-size:.9rem;font-weight:700;background:linear-gradient(90deg,#4fdfff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex:1;}
.theme-tabs{display:flex;gap:6px;}
.tab{padding:7px 16px;border-radius:99px;border:1px solid rgba(255,255,255,.1);background:transparent;
  color:var(--muted);font-size:.75rem;font-family:var(--FB);font-weight:700;cursor:pointer;transition:all .2s;}
.tab.at{border-color:var(--ice);background:rgba(79,223,255,.1);color:var(--ice);}
.tab.et{border-color:var(--eco);background:rgba(97,255,178,.08);color:var(--eco);}

/* ── HERO ── */
.hero{position:relative;z-index:1;text-align:center;padding:48px 20px 28px;}
.hero-label{font-size:.65rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.hero-title{font-family:var(--FH);font-size:clamp(1.5rem,5vw,2.4rem);font-weight:900;line-height:1.2;margin-bottom:10px;}
.hero-title.arctic{background:linear-gradient(135deg,#4fdfff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-title.ecology{background:linear-gradient(135deg,#61ffb2,#a7ff78);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-sub{font-size:.85rem;color:var(--muted);max-width:480px;margin:0 auto;}

/* ── SEARCH ── */
.search-wrap{position:relative;z-index:1;max-width:600px;margin:0 auto 32px;padding:0 20px;}
.search-inp{width:100%;padding:13px 18px 13px 44px;background:var(--s1);border:1px solid rgba(79,223,255,.15);
  border-radius:14px;color:var(--txt);font-size:.88rem;font-family:var(--FB);outline:none;transition:border-color .2s;}
.search-inp:focus{border-color:rgba(79,223,255,.4);}
.search-ico{position:absolute;left:34px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;}

/* ── STATS BAR ── */
.stats-bar{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:32px;padding:0 20px;position:relative;z-index:1;}
.stat-chip{padding:7px 16px;border-radius:99px;font-size:.72rem;font-weight:800;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);}

/* ── CARDS GRID ── */
.cards-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:18px;padding:0 20px 60px;max-width:1200px;margin:0 auto;
  position:relative;z-index:1;
}

/* ── FACT CARD ── */
.fcard{
  background:var(--s1);border:1px solid rgba(255,255,255,.07);border-radius:20px;
  overflow:hidden;cursor:pointer;transition:all .28s;
  display:flex;flex-direction:column;
}
.fcard:hover{transform:translateY(-6px);border-color:rgba(79,223,255,.3);box-shadow:0 20px 52px rgba(0,0,0,.55);}
.fcard.eco:hover{border-color:rgba(97,255,178,.3);}

/* image area */
.fc-img{height:180px;position:relative;overflow:hidden;background:rgba(5,15,35,.9);flex-shrink:0;}
.fc-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s;opacity:0;transition:opacity .4s, transform .4s;}
.fc-img img.loaded{opacity:1;}
.fcard:hover .fc-img img{transform:scale(1.06);}
.fc-img-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:3.5rem;background:linear-gradient(135deg,rgba(10,25,60,.9),rgba(5,15,38,.95));}
.fc-img-placeholder.hidden{display:none;}
.fc-category{position:absolute;bottom:8px;left:10px;padding:3px 10px;border-radius:99px;
  font-size:.6rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;backdrop-filter:blur(8px);}
.fc-category.arctic{background:rgba(79,223,255,.2);border:1px solid rgba(79,223,255,.35);color:var(--ice);}
.fc-category.ecology{background:rgba(97,255,178,.15);border:1px solid rgba(97,255,178,.3);color:var(--eco);}
.fc-num{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;

  display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;font-family:var(--FH);color:var(--muted);}

/* body */
.fc-body{padding:16px 18px 18px;flex:1;display:flex;flex-direction:column;gap:8px;}
.fc-title{font-size:.95rem;font-weight:800;line-height:1.35;}
.fc-text{font-size:.8rem;color:var(--muted);line-height:1.65;flex:1;}
.fc-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.fc-tag{font-size:.58rem;font-weight:800;padding:3px 9px;border-radius:6px;letter-spacing:.05em;text-transform:uppercase;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(180,220,255,.45);}

/* ── EXPANDED CARD ── */
.ov{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.85);backdrop-filter:blur(14px);padding:16px;overflow-y:auto;}
.ov.hidden{display:none;}
.expand-box{background:rgba(3,14,38,.99);border:1px solid rgba(79,223,255,.2);border-radius:24px;
  width:min(680px,100%);max-height:90vh;overflow-y:auto;animation:popIn .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.88);opacity:0;}to{transform:scale(1);opacity:1;}}
.exp-img{height:280px;position:relative;overflow:hidden;border-radius:24px 24px 0 0;}
.exp-img img{width:100%;height:100%;object-fit:cover;}
.exp-img-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:5rem;background:linear-gradient(135deg,rgba(10,25,60,.95),rgba(5,15,38,.98));}
.exp-body{padding:24px 26px 28px;}
.exp-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;}
.exp-title{font-family:var(--FH);font-size:1.15rem;font-weight:900;line-height:1.3;flex:1;}
.exp-close{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;
  padding:7px 12px;color:var(--muted);cursor:pointer;font-size:.85rem;transition:all .2s;flex-shrink:0;}
.exp-close:hover{background:rgba(255,95,122,.15);border-color:rgba(255,95,122,.3);color:#ff5f7a;}
.exp-text{font-size:.9rem;color:var(--muted);line-height:1.75;margin-bottom:18px;}
.exp-did{background:rgba(79,223,255,.05);border:1px solid rgba(79,223,255,.15);border-radius:12px;

.exp-did-label{font-size:.6rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ice);margin-bottom:8px;}
.exp-did-text{font-size:.82rem;color:var(--txt);line-height:1.65;}
.exp-tags{display:flex;gap:6px;flex-wrap:wrap;}
.exp-tag{font-size:.62rem;font-weight:800;padding:4px 10px;border-radius:7px;letter-spacing:.04em;
  text-transform:uppercase;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--muted);}

/* empty state */
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:.9rem;position:relative;z-index:1;}
.empty-ico{font-size:3rem;display:block;margin-bottom:12px;}

/* scrollbar */
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:99px;}
</style>
</head>

// ── AURORA ──
(()=>{
  const c=document.getElementById('bg');const ctx=c.getContext('2d');let t=0;
  const resize=()=>{c.width=innerWidth;c.height=innerHeight;};resize();window.addEventListener('resize',resize);
  const draw=()=>{
    ctx.clearRect(0,0,c.width,c.height);
    for(let i=0;i<3;i++){
      const yb=c.height*(.12+i*.06)+Math.sin(t*.28+i*2.1)*c.height*.055;
      const g=ctx.createLinearGradient(0,yb-65,0,yb+65);
      const h=[185,270,155][i];
      g.addColorStop(0,'transparent');g.addColorStop(.45,`hsla(${h},85%,60%,.04)`);g.addColorStop(.55,`hsla(${h},85%,60%,.062)`);g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(0,yb);
      for(let x=0;x<=c.width;x+=16)ctx.lineTo(x,yb+Math.sin((x/c.width)*Math.PI*5+t*.48+i)*22);
      ctx.lineTo(c.width,c.height);ctx.lineTo(0,c.height);ctx.closePath();ctx.fill();
    }
    t+=.008;requestAnimationFrame(draw);
  };draw();
})();

// ── STATE ──
let curTheme='arctic';let searchQ='';let expandedId=null;

// ── THEME SWITCH ──
function switchTheme(t){
  curTheme=t;
  ['tabA','tabE'].forEach(id=>document.getElementById(id).className='tab');
  document.getElementById(t==='arctic'?'tabA':'tabE').className='tab '+(t==='arctic'?'at':'et');
  const ht=document.getElementById('heroTitle');
  if(t==='arctic'){ht.textContent='🧊 Арктика';ht.className='hero-title arctic';document.getElementById('heroSub').textContent='Загадочный ледяной мир Северного полюса — животные, климат, наука и международное значение';}
  else{ht.textContent='🌿 Экология';ht.className='hero-title ecology';document.getElementById('heroSub').textContent='Биосфера, климатический кризис, переработка и устойчивое развитие — наш общий дом';}
  document.getElementById('searchInp').value='';searchQ='';
  render();
}

// ── SEARCH ──
function doSearch(v){searchQ=v.trim().toLowerCase();render();}

// ── RENDER ──
function render(){
  const pool=FACTS[curTheme];
  const filtered=searchQ?pool.filter(f=>f.title.toLowerCase().includes(searchQ)||f.text.toLowerCase().includes(searchQ)||f.tags.join(' ').toLowerCase().includes(searchQ)):pool;
  // stats
  const sb=document.getElementById('statsBar');
  sb.innerHTML=`<div class="stat-chip">📚 ${pool.length} фактов</div>
    <div class="stat-chip">🏷️ ${[...new Set(pool.flatMap(f=>f.tags))].length} тем</div>
    ${filtered.length!==pool.length?`<div class="stat-chip">🔍 Найдено: ${filtered.length}</div>`:''}`;
  // cards
  const grid=document.getElementById('cardsGrid');
  if(!filtered.length){grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><span class="empty-ico">🔍</span>Ничего не найдено по запросу «${searchQ}»</div>`;return;}
  grid.innerHTML=filtered.map((f,i)=>`
    <div class="fcard ${f.category}" onclick="openExp('${f.id}')" data-id="${f.id}">
      <div class="fc-img">
        <div class="fc-img-placeholder" id="ph_${f.id}">${f.emoji}</div>
        <img src="${f.img}" alt="${f.title}" loading="lazy" onload="imgLoaded('${f.id}')" onerror="imgError('${f.id}')">
        <div class="fc-category ${f.category}">${f.category==='arctic'?'🧊 Арктика':'🌿 Экология'}</div>
        <div class="fc-num">${i+1}</div>
      </div>
      <div class="fc-body">
        <div class="fc-title">${f.title}</div>
        <div class="fc-text">${f.text.slice(0,140)}…</div>
        <div class="fc-meta">${f.tags.map(t=>`<div class="fc-tag">${t}</div>`).join('')}</div>
      </div>
    </div>
  `).join('');
}

function imgLoaded(id){
  const img=document.querySelector(`[data-id="${id}"] img`);
  const ph=document.getElementById('ph_'+id);
  if(img)img.classList.add('loaded');
  if(ph)ph.classList.add('hidden');
}
function imgError(id){
  const img=document.querySelector(`[data-id="${id}"] img`);
  if(img)img.style.display='none';
}

// ── EXPAND ──
function openExp(id){
  const f=FACTS[curTheme].find(x=>x.id===id)||FACTS.arctic.find(x=>x.id===id)||FACTS.ecology.find(x=>x.id===id);
  if(!f)return;expandedId=id;
  document.getElementById('expBox').innerHTML=`
    <div class="exp-img">
      <div class="exp-img-ph" id="exph">${f.emoji}</div>
      <img src="${f.img}" alt="${f.title}" loading="lazy" onload="exImgLoad()" onerror="exImgErr()">
    </div>
    <div class="exp-body">
      <div class="exp-top">
        <div class="exp-title">${f.title}</div>
        <button class="exp-close" onclick="closeExp()">✕ Закрыть</button>
      </div>
      <div class="exp-text">${f.text}</div>
      <div class="exp-did">
        <div class="exp-did-label">💡 Знаете ли вы?</div>
        <div class="exp-did-text">${f.did}</div>
      </div>
      <div class="exp-tags">${f.tags.map(t=>`<div class="exp-tag">${t}</div>`).join('')}</div>
    </div>`;
  document.getElementById('expOv').classList.remove('hidden');
  document.body.style.overflow='hidden';
}
function exImgLoad(){const i=document.querySelector('.exp-img img');const p=document.getElementById('exph');if(i)i.style.opacity='1';if(p)p.style.display='none';}
function exImgErr(){const i=document.querySelector('.exp-img img');if(i)i.style.display='none';}
function closeExp(){document.getElementById('expOv').classList.add('hidden');document.body.style.overflow='';expandedId=null;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeExp();});

// ── INIT ──
render();
</script>
