<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Сброс кэша</title>
<style>body{background:#0a1628;color:#e8f4ff;font-family:system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;text-align:center}
.box{padding:30px;max-width:400px}.status{margin:20px 0;font-size:1.1rem;line-height:1.8}
.ok{color:#4fdfff}.err{color:#ff8080}.done{color:#7cff6b;font-size:1.3rem;font-weight:bold}
a.btn{display:inline-block;margin-top:16px;padding:14px 28px;background:#4fdfff;color:#0a1628;font-weight:bold;font-size:1.1rem;border-radius:12px;text-decoration:none}
</style></head><body><div class="box">
<h2>Сброс кэша КвизЦентр</h2>
<div id="log" class="status">Начинаю очистку…</div>
<div id="btn" style="display:none"><a class="btn" id="goLink" href="presenter.html">Открыть Presenter</a></div>
<script>
var log=document.getElementById('log');
function L(msg,cls){log.innerHTML+='<div class="'+(cls||'')+'">'+msg+'</div>';}

(async function(){
  // 1. Удаляем все кэши
  if('caches' in window){
    try{
      var keys=await caches.keys();
      L('Найдено кэшей: '+keys.length);
      for(var i=0;i<keys.length;i++){
        await caches.delete(keys[i]);
        L('Удалён: '+keys[i],'ok');
      }
    }catch(e){L('Ошибка кэшей: '+e.message,'err');}
  } else { L('Cache API недоступен','err'); }

  // 2. Удаляем все Service Workers
  if('serviceWorker' in navigator){
    try{
      var regs=await navigator.serviceWorker.getRegistrations();
      L('Service Workers: '+regs.length);
      for(var j=0;j<regs.length;j++){
        await regs[j].unregister();
        L('SW удалён: '+regs[j].scope,'ok');
      }
    }catch(e){L('Ошибка SW: '+e.message,'err');}
  } else { L('SW недоступен','err'); }

  // 3. Очищаем localStorage/sessionStorage
  try{localStorage.clear();L('localStorage очищен','ok');}catch(e){}
  try{sessionStorage.clear();L('sessionStorage очищен','ok');}catch(e){}

  // 4. Проверяем свежую версию (без кэша)
  L('');
  L('Проверяю версию на сервере…');
  try{
    var resp=await fetch('presenter.html',{cache:'no-store'});
    if(resp.ok){
      var text=await resp.text();
      var m=text.match(/presVer">(v\d+)/);
      L('Версия на сервере: '+(m?m[1]:'?'),'ok');
    }
  }catch(e){L('Не удалось проверить: '+e.message,'err');}

  L('');
  L('Очистка завершена!','done');
  L('Ждём 3 сек чтобы SW полностью выгрузился…');

  // 5. Ждём чтобы SW точно выгрузился, потом редирект
  await new Promise(function(r){setTimeout(r,3000);});

  // Редирект с cache-bust параметром
  window.location.replace('presenter.html?_=' + Date.now());
})();
</script>
</div></body></html>
