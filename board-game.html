<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🎲 Настольная игра</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#020b18;
  --surface:rgba(5,20,45,0.97);
  --accent:#4fdfff;
  --gold:#ffd84d;
  --green:#61ffb2;
  --red:#ff5f7a;
  --purple:#a78bfa;
  --text:#dff0ff;
  --muted:rgba(180,220,255,0.45);
  --font-d:'Unbounded',sans-serif;
  --font-b:'Nunito',sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font-b);}
body{background:var(--bg);color:var(--text);}

/* ── AURORA ── */
#auroraCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── LAYOUT ── */
#app{position:relative;z-index:1;width:100%;height:100vh;display:flex;flex-direction:column;}

/* ─────────────────────────────
   SETUP SCREEN
───────────────────────────── */
#setupScreen{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow-y:auto;padding:24px 16px;gap:0;
}
.setup-hero{text-align:center;margin-bottom:28px;}
.setup-hero h1{
  font-family:var(--font-d);font-size:clamp(1.4rem,4vw,2rem);font-weight:900;
  background:linear-gradient(135deg,#4fdfff 0%,#a78bfa 50%,#ffd84d 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:6px;line-height:1.2;
}
.setup-hero p{font-size:.82rem;color:var(--muted);}

.setup-card{
  background:var(--surface);border:1px solid rgba(79,223,255,0.15);
  border-radius:22px;padding:26px;width:min(500px,100%);
  box-shadow:0 24px 64px rgba(0,0,0,0.6);backdrop-filter:blur(24px);
}
.sblock{margin-bottom:22px;}
.sblock:last-child{margin-bottom:0;}
.slabel{
  font-size:.62rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;
}

/* theme picker */
.theme-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.t-btn{
  padding:14px 10px;border-radius:14px;border:2px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03);cursor:pointer;text-align:center;
  transition:all .22s;font-family:var(--font-b);
}
.t-btn:hover{border-color:rgba(79,223,255,.35);background:rgba(79,223,255,.06);}
.t-btn.active-arctic{border-color:var(--accent);background:rgba(79,223,255,.1);box-shadow:0 0 24px rgba(79,223,255,.18);}
.t-btn.active-eco{border-color:var(--green);background:rgba(97,255,178,.08);box-shadow:0 0 24px rgba(97,255,178,.15);}
.t-ico{font-size:1.8rem;display:block;margin-bottom:5px;}
.t-name{font-size:.85rem;font-weight:800;}
.t-desc{font-size:.66rem;color:var(--muted);margin-top:2px;}

/* teams */
.teams-wrap{display:flex;flex-direction:column;gap:8px;}
.tr{
  display:flex;align-items:center;gap:9px;
  padding:9px 12px;border-radius:12px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
}
.tdot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.tinput{
  flex:1;background:transparent;border:none;color:var(--text);
  font-size:.87rem;font-family:var(--font-b);font-weight:700;outline:none;
}
.tinput::placeholder{color:var(--muted);font-weight:600;}
.tbtn-del{
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:.9rem;padding:2px;transition:color .15s;
}
.tbtn-del:hover{color:var(--red);}
.btn-add{
  padding:9px;border-radius:12px;border:1px dashed rgba(255,255,255,.1);
  background:transparent;color:var(--muted);cursor:pointer;font-size:.8rem;
  font-family:var(--font-b);font-weight:700;transition:all .2s;
}
.btn-add:hover{border-color:var(--accent);color:var(--accent);}

/* cells select */
.cells-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.cel-btn{
  padding:10px 8px;border-radius:12px;border:2px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03);cursor:pointer;text-align:center;transition:all .2s;
  font-family:var(--font-b);
}
.cel-btn:hover{border-color:rgba(255,216,77,.4);}
.cel-btn.active{border-color:var(--gold);background:rgba(255,216,77,.08);}
.cel-n{font-size:1.1rem;font-weight:900;font-family:var(--font-d);color:var(--gold);}
.cel-d{font-size:.65rem;color:var(--muted);margin-top:2px;}

/* start button */
.btn-start{
  width:100%;padding:15px;margin-top:6px;
  font-family:var(--font-d);font-size:.92rem;font-weight:700;
  background:linear-gradient(135deg,#4fdfff,#a78bfa);
  color:#010c1e;border:none;border-radius:14px;cursor:pointer;
  transition:all .28s;letter-spacing:.04em;
}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(79,223,255,.38);}
.btn-start:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none;}

/* ─────────────────────────────
   GAME SCREEN
───────────────────────────── */
#gameScreen{flex:1;display:flex;overflow:hidden;}
#gameScreen.hidden{display:none;}

/* board area */
.board-area{flex:1;position:relative;overflow:hidden;}
#boardCanvas{width:100%;height:100%;display:block;}

/* right panel */
.g-panel{
  width:290px;flex-shrink:0;
  background:rgba(3,12,30,.97);border-left:1px solid rgba(79,223,255,.1);
  display:flex;flex-direction:column;overflow:hidden;
}
@media(max-width:700px){
  #gameScreen{flex-direction:column;}
  .board-area{flex:1;min-height:0;}
  .g-panel{width:100%;height:auto;border-left:none;border-top:1px solid rgba(79,223,255,.1);}
}

.gp-head{
  padding:13px 16px 10px;border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:space-between;
}
.gp-logo{font-family:var(--font-d);font-size:.78rem;font-weight:700;color:var(--accent);}
.gp-round{font-size:.65rem;color:var(--muted);}

.gp-active{
  margin:12px;padding:12px 14px;border-radius:14px;
  border:2px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02);
  text-align:center;
}
.gpa-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.gpa-name{font-family:var(--font-d);font-size:1rem;font-weight:900;margin:3px 0 2px;}
.gpa-sub{font-size:.7rem;color:var(--muted);}

.gp-teams{flex:1;overflow-y:auto;padding:0 12px;display:flex;flex-direction:column;gap:6px;}
.tc{
  display:flex;align-items:center;gap:9px;
  padding:8px 11px;border-radius:11px;
  border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02);
  transition:all .25s;
}
.tc.tc-active{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.05);transform:scale(1.01);}
.tc-av{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;font-weight:900;font-family:var(--font-d);flex-shrink:0;
}
.tc-info{flex:1;min-width:0;}
.tc-name{font-size:.82rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tc-stat{font-size:.65rem;color:var(--muted);}
.tc-pos{font-size:.65rem;padding:2px 6px;border-radius:99px;background:rgba(255,255,255,.05);color:var(--muted);}

.gp-log{
  padding:0 12px;max-height:90px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.06) transparent;
}
.log-e{font-size:.67rem;color:var(--muted);padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);line-height:1.5;}

.gp-dice{padding:12px;border-top:1px solid rgba(255,255,255,.06);}
.dice-disp{
  text-align:center;font-size:2.8rem;min-height:56px;
  display:flex;align-items:center;justify-content:center;
  transition:transform .1s;
}
.btn-roll{
  width:100%;padding:12px;
  font-family:var(--font-d);font-size:.85rem;font-weight:700;
  border:none;border-radius:12px;cursor:pointer;
  transition:all .25s;letter-spacing:.04em;color:#010c1e;
}
.btn-roll:disabled{opacity:.35;cursor:not-allowed;}
.btn-roll.arctic{background:linear-gradient(135deg,#4fdfff,#6b7aff);}
.btn-roll.eco{background:linear-gradient(135deg,#61ffb2,#a7ff78);}

/* ─────────────────────────────
   OVERLAYS
───────────────────────────── */
.ov{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.82);backdrop-filter:blur(10px);
  padding:16px;
}
.ov.hidden{display:none!important;}

/* Question modal */
.q-box{
  background:rgba(4,16,40,.99);border:1px solid rgba(79,223,255,.22);
  border-radius:22px;padding:28px;width:min(620px,100%);
  box-shadow:0 40px 100px rgba(0,0,0,.85);
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.88);opacity:0;}to{transform:scale(1);opacity:1;}}
.q-team{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;border-radius:99px;
  font-size:.68rem;font-weight:800;letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:10px;
}
.q-badge{
  font-size:.7rem;color:var(--muted);margin-bottom:12px;
  display:flex;align-items:center;gap:6px;
}
.q-timer-wrap{height:4px;background:rgba(255,255,255,.07);border-radius:99px;margin-bottom:18px;overflow:hidden;}
.q-timer-bar{height:100%;border-radius:99px;transition:width .09s linear;}
.q-txt{font-size:1.08rem;font-weight:800;line-height:1.55;margin-bottom:20px;}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.q-opt{
  padding:14px 12px;border-radius:13px;
  border:2px solid rgba(255,255,255,.09);background:rgba(255,255,255,.03);
  cursor:pointer;font-size:.86rem;font-weight:700;line-height:1.4;
  transition:all .2s;text-align:center;font-family:var(--font-b);color:var(--text);
}
.q-opt:hover:not(:disabled){border-color:rgba(79,223,255,.55);background:rgba(79,223,255,.08);transform:translateY(-2px);}
.q-opt:disabled{cursor:default;}
.q-opt.ok{border-color:var(--green)!important;background:rgba(97,255,178,.13)!important;color:var(--green)!important;}
.q-opt.bad{border-color:var(--red)!important;background:rgba(255,95,122,.08)!important;opacity:.6;}
.q-fb{
  margin-top:14px;padding:12px 14px;border-radius:11px;
  font-size:.83rem;line-height:1.5;display:none;
}
.q-fb.show{display:block;}
.q-fb.ok{background:rgba(97,255,178,.07);border:1px solid rgba(97,255,178,.22);color:var(--green);}
.q-fb.bad{background:rgba(255,95,122,.07);border:1px solid rgba(255,95,122,.18);color:var(--red);}
.q-next{
  width:100%;margin-top:14px;padding:13px;
  font-family:var(--font-d);font-size:.85rem;font-weight:700;
  background:linear-gradient(135deg,#4fdfff,#a78bfa);color:#010c1e;
  border:none;border-radius:12px;cursor:pointer;
  display:none;transition:all .2s;
}
.q-next.show{display:block;}
.q-next:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(79,223,255,.35);}

/* Event modal */
.ev-box{
  background:rgba(4,16,40,.99);border-radius:22px;
  padding:36px 30px;width:min(440px,100%);text-align:center;
  box-shadow:0 40px 100px rgba(0,0,0,.85);
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
}
.ev-ico{font-size:3.5rem;display:block;margin-bottom:12px;}
.ev-title{font-family:var(--font-d);font-size:1.3rem;font-weight:900;margin-bottom:9px;}
.ev-desc{font-size:.88rem;color:var(--muted);line-height:1.65;margin-bottom:22px;}
.ev-ok{
  padding:13px 32px;font-family:var(--font-d);font-size:.85rem;font-weight:700;
  border:none;border-radius:12px;cursor:pointer;
  background:linear-gradient(135deg,#4fdfff,#a78bfa);color:#010c1e;transition:all .2s;
}
.ev-ok:hover{transform:translateY(-2px);}

/* Win screen */
#winScreen{flex-direction:column;gap:0;overflow-y:auto;padding:32px 16px;}
#winScreen.hidden{display:none;}
.win-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;max-width:540px;width:100%;}
.win-trophy{font-size:4.5rem;animation:bounce 2s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}
.win-h{font-family:var(--font-d);font-size:1.6rem;font-weight:900;text-align:center;background:linear-gradient(135deg,var(--gold),#ff9f4d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.win-sub{font-size:.82rem;color:var(--muted);text-align:center;}
.win-card{
  background:var(--surface);border:1px solid rgba(79,223,255,.15);
  border-radius:20px;padding:22px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.pod-row{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);
}
.pod-row:last-child{border-bottom:none;}
.pod-num{font-family:var(--font-d);font-size:1.1rem;font-weight:900;width:32px;text-align:center;}
.pod-num.g{color:var(--gold);}
.pod-num.s{color:#c0ccd8;}
.pod-num.b{color:#cd7f32;}
.pod-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:900;font-family:var(--font-d);}
.pod-name{flex:1;font-weight:800;font-size:.9rem;}
.pod-right{text-align:right;}
.pod-pts{font-family:var(--font-d);font-size:1rem;font-weight:900;color:var(--gold);}
.pod-ans{font-size:.65rem;color:var(--muted);}
.win-btns{display:flex;gap:10px;width:100%;}
.wbtn{flex:1;padding:13px;font-family:var(--font-d);font-size:.8rem;font-weight:700;border:none;border-radius:12px;cursor:pointer;transition:all .2s;}
.wbtn.primary{background:linear-gradient(135deg,#4fdfff,#a78bfa);color:#010c1e;}
.wbtn.secondary{background:rgba(255,255,255,.05);color:var(--text);border:1px solid rgba(255,255,255,.1);}
.wbtn:hover{transform:translateY(-2px);}

/* scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:99px;}
</style>
</head>
<body>
<canvas id="auroraCanvas"></canvas>
<div id="app">

<!-- ════ SETUP ════ -->
<div id="setupScreen">
  <div class="setup-hero">
    <h1>🎲 Квиз-Приключение</h1>
    <p>Настольная игра для 2–4 команд · Арктика или Экология</p>
  </div>
  <div class="setup-card">
    <div class="sblock">
      <div class="slabel">🌍 Тема</div>
      <div class="theme-row">
        <div class="t-btn active-arctic" id="tArctic" onclick="pickTheme('arctic')">
          <span class="t-ico">🧊</span>
          <div class="t-name">Арктика</div>
          <div class="t-desc">Ледяной мир севера</div>
        </div>
        <div class="t-btn" id="tEco" onclick="pickTheme('ecology')">
          <span class="t-ico">🌿</span>
          <div class="t-name">Экология</div>
          <div class="t-desc">Природа и климат</div>
        </div>
      </div>
    </div>

    <div class="sblock">
      <div class="slabel">🎯 Длина игры</div>
      <div class="cells-row">
        <div class="cel-btn active" id="c24" onclick="pickLen(24)"><div class="cel-n">24</div><div class="cel-d">~15 мин</div></div>
        <div class="cel-btn" id="c36" onclick="pickLen(36)"><div class="cel-n">36</div><div class="cel-d">~25 мин</div></div>
        <div class="cel-btn" id="c48" onclick="pickLen(48)"><div class="cel-n">48</div><div class="cel-d">~35 мин</div></div>
      </div>
    </div>

    <div class="sblock">
      <div class="slabel">👥 Команды (2–4)</div>
      <div class="teams-wrap" id="teamsWrap"></div>
      <button class="btn-add" id="addBtn" onclick="addTeam()" style="width:100%;margin-top:8px;">+ Добавить команду</button>
    </div>

    <button class="btn-start" id="startBtn" onclick="startGame()">🚀 Начать игру!</button>
  </div>
</div>

<!-- ════ GAME ════ -->
<div id="gameScreen" class="hidden">
  <div class="board-area"><canvas id="boardCanvas"></canvas></div>
  <div class="g-panel">
    <div class="gp-head">
      <div class="gp-logo" id="gpLogo">🧊 АРКТИКА</div>
      <div class="gp-round" id="gpRound">Ход 1</div>
    </div>
    <div class="gp-active">
      <div class="gpa-label">Ходит</div>
      <div class="gpa-name" id="gpaName">—</div>
      <div class="gpa-sub" id="gpaSub">Клетка 1</div>
    </div>
    <div class="gp-teams" id="gpTeams"></div>
    <div class="gp-log" id="gpLog"></div>
    <div class="gp-dice">
      <div class="dice-disp" id="diceDisp">🎲</div>
      <button class="btn-roll arctic" id="rollBtn" onclick="doRoll()">🎲 Бросить кубик</button>
    </div>
  </div>
</div>

<!-- ════ WIN ════ -->
<div class="ov hidden" id="winScreen">
  <div class="win-wrap">
    <div class="win-trophy">🏆</div>
    <div class="win-h" id="winH">Победитель!</div>
    <div class="win-sub" id="winSb">Игра завершена</div>
    <div class="win-card" id="winPodium"></div>
    <div class="win-btns">
      <button class="wbtn primary" onclick="doRestart()">🔄 Снова</button>
      <button class="wbtn secondary" onclick="doClose()">🏠 В меню</button>
    </div>
  </div>
</div>

<!-- ════ EVENT ════ -->
<div class="ov hidden" id="evOv">
  <div class="ev-box">
    <span class="ev-ico" id="evIco">⭐</span>
    <div class="ev-title" id="evTt">Событие!</div>
    <div class="ev-desc" id="evDs">—</div>
    <button class="ev-ok" onclick="closeEvent()">Понятно!</button>
  </div>
</div>

<!-- ════ QUESTION ════ -->
<div class="ov hidden" id="qOv">
  <div class="q-box">
    <div class="q-team" id="qTeam">Команда</div>
    <div class="q-badge" id="qBadge">❓ Вопрос</div>
    <div class="q-timer-wrap"><div class="q-timer-bar" id="qBar" style="width:100%;background:linear-gradient(90deg,#4fdfff,#a78bfa)"></div></div>
    <div class="q-txt" id="qTxt">—</div>
    <div class="q-opts" id="qOpts"></div>
    <div class="q-fb" id="qFb"></div>
    <button class="q-next" id="qNext" onclick="closeQ()">Продолжить →</button>
  </div>
</div>

</div><!-- #app -->
<script>
// ══════════════════════════════════════
// AURORA
// ══════════════════════════════════════
(()=>{
  const c=document.getElementById('auroraCanvas');
  const ctx=c.getContext('2d');
  let t=0;
  const resize=()=>{c.width=innerWidth;c.height=innerHeight;};
  resize(); window.addEventListener('resize',resize);
  const draw=()=>{
    ctx.clearRect(0,0,c.width,c.height);
    for(let i=0;i<3;i++){
      const yBase=c.height*(0.2+i*0.05)+Math.sin(t*0.35+i*2.1)*c.height*0.06;
      const g=ctx.createLinearGradient(0,yBase-70,0,yBase+70);
      const h=[190,270,155][i];
      g.addColorStop(0,'transparent');
      g.addColorStop(.45,`hsla(${h},85%,60%,.055)`);
      g.addColorStop(.55,`hsla(${h},85%,60%,.08)`);
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.moveTo(0,yBase);
      for(let x=0;x<=c.width;x+=18){
        ctx.lineTo(x, yBase+Math.sin((x/c.width)*Math.PI*5+t*0.55+i)*28);
      }
      ctx.lineTo(c.width,c.height); ctx.lineTo(0,c.height);
      ctx.closePath(); ctx.fill();
    }
    // stars
    ctx.fillStyle='rgba(220,240,255,0.55)';
    for(let i=0;i<90;i++){
      const sx=(Math.sin(i*137.508)*0.5+0.5)*c.width;
      const sy=(Math.sin(i*97.3)*0.5+0.5)*c.height*0.65;
      const r=0.4+Math.sin(t*1.5+i)*0.35;
      ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.fill();
    }
    t+=0.012; requestAnimationFrame(draw);
  };
  draw();
})();

// ══════════════════════════════════════

// CELL TYPES PATTERN

const CPATTERN=['normal','question','question','bonus','question','question','trap','question','question','skip','question','double'];
const CSTYLES={
  normal:  {fill:'rgba(6,20,48,.85)',  stroke:'rgba(79,223,255,.2)',  label:''},
  question:{fill:'rgba(4,18,44,.92)',  stroke:'rgba(79,223,255,.5)',  label:'?'},
  bonus:   {fill:'rgba(4,28,8,.92)',   stroke:'rgba(97,255,178,.65)', label:'⭐'},
  trap:    {fill:'rgba(30,5,12,.92)',  stroke:'rgba(255,95,122,.6)',  label:'❄'},
  skip:    {fill:'rgba(22,8,36,.92)',  stroke:'rgba(167,139,250,.6)', label:'🌀'},
  double:  {fill:'rgba(28,20,2,.92)',  stroke:'rgba(255,216,77,.65)', label:'✨'},
  start:   {fill:'rgba(2,28,14,.92)',  stroke:'rgba(97,255,178,.9)',  label:'▶'},
  finish:  {fill:'rgba(28,20,2,.92)',  stroke:'rgba(255,216,77,.95)', label:'🏆'},
};
const TDEF=[
  {color:'#4fdfff',bg:'rgba(79,223,255,.15)',name:'Синие'},
  {color:'#ff5f7a',bg:'rgba(255,95,122,.15)',name:'Красные'},
  {color:'#61ffb2',bg:'rgba(97,255,178,.15)',name:'Зелёные'},
  {color:'#ffd84d',bg:'rgba(255,216,77,.15)',name:'Жёлтые'},
];

function pickTheme(t){
  theme=t;
  document.getElementById('tArctic').className='t-btn'+(t==='arctic'?' active-arctic':'');
  document.getElementById('tEco').className='t-btn'+(t==='ecology'?' active-eco':'');
}
function pickLen(n){
  cellCount=n;
  ['c24','c36','c48'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById('c'+n).classList.add('active');
}
function initSetup(){
  setupTeams=[{name:'',ti:0},{name:'',ti:1}];
  renderSetup();
}
function renderSetup(){
  const w=document.getElementById('teamsWrap');
  w.innerHTML='';
  setupTeams.forEach((t,i)=>{
    const d=TDEF[t.ti];
    const el=document.createElement('div');
    el.className='tr';
    el.innerHTML=`<div class="tdot" style="background:${d.color}"></div>
      <input class="tinput" placeholder="${d.name}" value="${t.name}" oninput="setupTeams[${i}].name=this.value"/>

    w.appendChild(el);

function addTeam(){if(setupTeams.length>=4)return;setupTeams.push({name:'',ti:setupTeams.length});renderSetup();}
function delTeam(i){if(setupTeams.length<=2)return;setupTeams.splice(i,1);setupTeams.forEach((t,j)=>t.ti=j);renderSetup();}

function startGame(){
  teams=setupTeams.map((t,i)=>({
    name:t.name.trim()||TDEF[i].name,ti:i,
    pos:0,score:0,correct:0,wrong:0,skip:false
  }));
  curIdx=0; totalMoves=0; usedQ.clear(); busy=false;

  document.getElementById('setupScreen').style.display='none';
  document.getElementById('gameScreen').classList.remove('hidden');
  document.getElementById('winScreen').classList.add('hidden');

  const isEco=theme==='ecology';
  document.getElementById('gpLogo').textContent=isEco?'🌿 ЭКОЛОГИЯ':'🧊 АРКТИКА';
  const rb=document.getElementById('rollBtn');
  rb.className='btn-roll '+(isEco?'eco':'arctic');

  initBoard();
  renderPanel();
  updateActive();
  log('🚀 Игра началась! Первый ход: '+teams[0].name);
}

// BOARD
// ══════════════════════════════════════
function getCellType(i){
  if(i===0)return'start';
  if(i===cellCount-1)return'finish';
  return CPATTERN[i%CPATTERN.length];
}
function buildLayout(W,H){
  cells=[];
  const COLS=Math.min(8,Math.ceil(Math.sqrt(cellCount*1.6)));
  const ROWS=Math.ceil(cellCount/COLS);
  const px=36,py=36;
  const cw=(W-px*2)/COLS, ch=(H-py*2)/ROWS;
  const r=Math.min(cw,ch)*0.41;
  for(let i=0;i<cellCount;i++){
    const row=Math.floor(i/COLS);
    const col=row%2===0?i%COLS:(COLS-1-i%COLS);
    cells.push({cx:px+col*cw+cw/2, cy:py+row*ch+ch/2, r, type:getCellType(i), idx:i});
  }
}
function drawBoard(){
  if(!bCtx)return;
  const W=bCanvas.width,H=bCanvas.height;
  bCtx.clearRect(0,0,W,H);
  // bg panel
  bCtx.fillStyle='rgba(2,9,22,.55)';
  bCtx.beginPath();bCtx.roundRect(14,14,W-28,H-28,16);bCtx.fill();
  // path
  bCtx.setLineDash([3,8]);bCtx.strokeStyle='rgba(79,223,255,.07)';bCtx.lineWidth=1.5;
  bCtx.beginPath();
  cells.forEach((c,i)=>{i===0?bCtx.moveTo(c.cx,c.cy):bCtx.lineTo(c.cx,c.cy);});
  bCtx.stroke(); bCtx.setLineDash([]);
  // cells
  cells.forEach(cell=>{
    const cs=CSTYLES[cell.type];
    if(cell.type!=='normal'){bCtx.shadowColor=cs.stroke;bCtx.shadowBlur=12;}
    // hex
    bCtx.beginPath();
    for(let a=0;a<6;a++){
      const ang=(Math.PI/3)*a-Math.PI/6;
      const hx=cell.cx+cell.r*Math.cos(ang),hy=cell.cy+cell.r*Math.sin(ang);
      a===0?bCtx.moveTo(hx,hy):bCtx.lineTo(hx,hy);
    }
    bCtx.closePath();
    bCtx.fillStyle=cs.fill; bCtx.fill();
    bCtx.strokeStyle=cs.stroke; bCtx.lineWidth=cell.type==='normal'?1.2:2.2; bCtx.stroke();
    bCtx.shadowBlur=0;
    // number
    bCtx.font=`700 ${cell.r*.42}px Nunito,sans-serif`;
    bCtx.textAlign='center'; bCtx.textBaseline='middle';
    bCtx.fillStyle=cell.type==='normal'?'rgba(255,255,255,.22)':'rgba(255,255,255,.55)';
    bCtx.fillText(cell.idx+1, cell.cx, cell.cy-(cs.label?cell.r*.2:0));
    if(cs.label){
      bCtx.font=`${cell.r*.44}px serif`;
      bCtx.fillText(cs.label, cell.cx, cell.cy+cell.r*.28);
    }
  });
  // tokens
  teams.forEach((team,ti)=>{
    const cell=cells[team.pos]; if(!cell)return;
    const d=TDEF[ti];
    const n=teams.length;
    const offsets=[
      [{dx:0,dy:0}],
      [{dx:-cell.r*.22,dy:0},{dx:cell.r*.22,dy:0}],
      [{dx:-cell.r*.22,dy:-cell.r*.15},{dx:cell.r*.22,dy:-cell.r*.15},{dx:0,dy:cell.r*.2}],
      [{dx:-cell.r*.2,dy:-cell.r*.15},{dx:cell.r*.2,dy:-cell.r*.15},{dx:-cell.r*.2,dy:cell.r*.15},{dx:cell.r*.2,dy:cell.r*.15}]
    ];
    const off=offsets[n-1][ti]||{dx:0,dy:0};
    const tx=cell.cx+off.dx, ty=cell.cy+off.dy;
    bCtx.shadowColor=d.color; bCtx.shadowBlur=18;
    bCtx.beginPath(); bCtx.arc(tx,ty,cell.r*.3,0,Math.PI*2);
    bCtx.fillStyle=d.bg; bCtx.fill();
    bCtx.strokeStyle=d.color; bCtx.lineWidth=2.2; bCtx.stroke();
    bCtx.shadowBlur=0;
    bCtx.font=`900 ${cell.r*.28}px Unbounded,sans-serif`;
    bCtx.textAlign='center'; bCtx.textBaseline='middle';
    bCtx.fillStyle=d.color;
    bCtx.fillText(team.name[0].toUpperCase(),tx,ty);
  });
}
function initBoard(){
  bCanvas=document.getElementById('boardCanvas');
  bCtx=bCanvas.getContext('2d');
  const area=bCanvas.parentElement;
  const resize=()=>{
    bCanvas.width=area.clientWidth; bCanvas.height=area.clientHeight;
    buildLayout(bCanvas.width,bCanvas.height);
    drawBoard();
  };
  resize();
  window.addEventListener('resize',resize);
  const loop=()=>{drawBoard();requestAnimationFrame(loop);};
  loop();
  boardReady=true;
}

// PANEL
// ══════════════════════════════════════
function renderPanel(){
  const tl=document.getElementById('gpTeams');
  tl.innerHTML='';
  teams.forEach((team,i)=>{
    const d=TDEF[i];
    const el=document.createElement('div');
    el.className='tc'+(i===curIdx?' tc-active':'');
    el.id='tc'+i;
    el.innerHTML=`
      <div class="tc-av" style="background:${d.bg};color:${d.color}">${team.name[0].toUpperCase()}</div>
      <div class="tc-info">
        <div class="tc-name" style="color:${d.color}">${team.name}</div>
        <div class="tc-stat">⭐${team.score} · ✅${team.correct} · ❌${team.wrong}</div>
      </div>
      <div class="tc-pos">Кл.${team.pos+1}</div>`;
    tl.appendChild(el);
  });
}
function updateActive(){
  const team=teams[curIdx], d=TDEF[curIdx];
  document.getElementById('gpRound').textContent='Ход '+(totalMoves+1);
  const nn=document.getElementById('gpaName');
  nn.textContent=team.name; nn.style.color=d.color;
  document.getElementById('gpaSub').textContent=`Клетка ${team.pos+1} из ${cellCount}`;
  document.getElementById('gp-active'||'gp-active');
  document.querySelectorAll('.tc').forEach((el,i)=>el.classList.toggle('tc-active',i===curIdx));
}
function log(msg){
  const gl=document.getElementById('gpLog');
  const e=document.createElement('div'); e.className='log-e'; e.textContent=msg;
  gl.prepend(e);
  while(gl.children.length>18)gl.removeChild(gl.lastChild);
}

// ══════════════════════════════════════
// DICE
// ══════════════════════════════════════
function doRoll(){
  if(busy)return;
  const team=teams[curIdx];
  if(team.skip){team.skip=false;log('🌀 '+team.name+' пропускает ход');nextTurn();return;}
  busy=true;
  document.getElementById('rollBtn').disabled=true;
  const FACES=['⚀','⚁','⚂','⚃','⚄','⚅'];
  const val=Math.floor(Math.random()*6)+1;
  let n=0;
  const iv=setInterval(()=>{
    document.getElementById('diceDisp').textContent=FACES[Math.floor(Math.random()*6)];
    n++;
    if(n>=16){
      clearInterval(iv);
      const dd=document.getElementById('diceDisp');
      dd.textContent=FACES[val-1];
      dd.style.transform='scale(1.3)';
      setTimeout(()=>{dd.style.transform='';},250);
      totalMoves++;
      log(`🎲 ${team.name} → ${val}`);
      setTimeout(()=>doMove(val),500);
    }
  },70);
}
function doMove(steps){
  const team=teams[curIdx];
  team.pos=Math.min(team.pos+steps, cellCount-1);
  renderPanel(); updateActive();
  log(`📍 ${team.name} → клетка ${team.pos+1}`);
  if(team.pos>=cellCount-1){setTimeout(()=>showWin(),600);return;}
  landCell(team.pos);
}

// ══════════════════════════════════════
// CELL LANDING
// ══════════════════════════════════════
function landCell(pos){
  const type=getCellType(pos), team=teams[curIdx];
  if(type==='bonus'){
    team.score+=3; renderPanel();
    showEvent('⭐','Бонус!',`${team.name} получает +3 очка!`,()=>nextTurn());
  } else if(type==='trap'){
    team.pos=Math.max(0,team.pos-2); renderPanel(); updateActive();
    showEvent('❄️','Ледяная ловушка!',`${team.name} откатывается на 2 клетки назад!`,()=>nextTurn());
  } else if(type==='skip'){
    team.skip=true;
    showEvent('🌀','Буря!',`${team.name} попадает в полярную бурю — следующий ход пропускается!`,()=>nextTurn());
  } else if(type==='double'){
    pendDouble=true;
    showEvent('✨','Двойные очки!',`${team.name} попадает на особую клетку — за правильный ответ +4 очка!`,()=>showQuestion());
  } else {
    showQuestion();
  }
}

// ══════════════════════════════════════
// EVENTS
// ══════════════════════════════════════
function showEvent(ico,tt,ds,cb){
  document.getElementById('evIco').textContent=ico;
  document.getElementById('evTt').textContent=tt;
  document.getElementById('evDs').textContent=ds;
  document.getElementById('evOv').classList.remove('hidden');
  evCb=cb;
}
function closeEvent(){
  document.getElementById('evOv').classList.add('hidden');
  const cb=evCb; evCb=null; if(cb)cb();
}

// ══════════════════════════════════════
// QUESTION
// ══════════════════════════════════════
function pickQ(){
  const pool=QDB[theme];
  const avail=pool.map((_,i)=>i).filter(i=>!usedQ.has(i));
  if(!avail.length){usedQ.clear();return pickQ();}
  const idx=avail[Math.floor(Math.random()*avail.length)];
  usedQ.add(idx); return pool[idx];
}
function showQuestion(){
  const q=pickQ(), team=teams[curIdx], d=TDEF[curIdx];
  document.getElementById('qTeam').textContent=team.name;
  document.getElementById('qTeam').style.background=d.bg;
  document.getElementById('qTeam').style.color=d.color;
  document.getElementById('qTeam').style.border=`1px solid ${d.color}44`;
  const isDouble=pendDouble;
  document.getElementById('qBadge').innerHTML=isDouble?'✨ Двойные очки':'❓ Вопрос';
  document.getElementById('qTxt').textContent=q.q;
  document.getElementById('qFb').className='q-fb';
  document.getElementById('qNext').className='q-next';
  // options
  const opts=document.getElementById('qOpts'); opts.innerHTML='';
  q.o.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='q-opt'; btn.textContent=opt;
    btn.onclick=()=>checkQ(i,q.a,q.e,isDouble);
    opts.appendChild(btn);
  });
  document.getElementById('qOv').classList.remove('hidden');
  // timer
  let left=20; updateBar(1);
  clearInterval(qTimer);
  qTimer=setInterval(()=>{
    left--;
    updateBar(left/20);
    if(left<=0){clearInterval(qTimer);timeoutQ(q.a);}
  },1000);
}
function updateBar(f){
  const bar=document.getElementById('qBar');
  bar.style.width=(f*100)+'%';
  bar.style.background=f>.5?'linear-gradient(90deg,#4fdfff,#a78bfa)':f>.25?'linear-gradient(90deg,#ffd84d,#ff9f4d)':'linear-gradient(90deg,#ff5f7a,#ff9f4d)';
}
function checkQ(sel,correct,exp,isDouble){
  clearInterval(qTimer);
  document.querySelectorAll('.q-opt').forEach(b=>b.disabled=true);
  const team=teams[curIdx];
  const fb=document.getElementById('qFb');
  if(sel===correct){
    document.querySelectorAll('.q-opt')[sel].classList.add('ok');
    const pts=isDouble?4:2;
    team.score+=pts; team.correct++;
    fb.textContent=`✅ Верно! +${pts} очка. ${exp}`;
    fb.className='q-fb show ok';
    log(`✅ ${team.name} +${pts}`);
  } else {
    document.querySelectorAll('.q-opt')[sel].classList.add('bad');
    document.querySelectorAll('.q-opt')[correct].classList.add('ok');
    team.wrong++;
    fb.textContent=`❌ Неверно. ${exp}`;
    fb.className='q-fb show bad';
    log(`❌ ${team.name}`);
  }
  pendDouble=false;
  renderPanel();
  document.getElementById('qNext').className='q-next show';
}
function timeoutQ(correct){
  clearInterval(qTimer);
  document.querySelectorAll('.q-opt').forEach((b,i)=>{b.disabled=true;if(i===correct)b.classList.add('ok');});
  teams[curIdx].wrong++;
  const fb=document.getElementById('qFb');
  fb.textContent='⏰ Время вышло!';
  fb.className='q-fb show bad';
  pendDouble=false;
  renderPanel();
  document.getElementById('qNext').className='q-next show';
}
function closeQ(){
  clearInterval(qTimer);
  document.getElementById('qOv').classList.add('hidden');
  nextTurn();
}

// ══════════════════════════════════════
// TURN
// ══════════════════════════════════════
function nextTurn(){
  curIdx=(curIdx+1)%teams.length;
  busy=false;
  document.getElementById('rollBtn').disabled=false;
  renderPanel(); updateActive();
  log('➡️ Ход: '+teams[curIdx].name);
}

// ══════════════════════════════════════
// WIN
// ══════════════════════════════════════
function showWin(){
  const sorted=[...teams].sort((a,b)=>b.score-a.score||b.correct-a.correct);
  document.getElementById('winH').textContent=sorted[0].name+' побеждает!';
  document.getElementById('winSb').textContent='Тема: '+(theme==='arctic'?'Арктика':'Экология')+' · '+cellCount+' клеток';
  const pl=['🥇','🥈','🥉','4️⃣'];
  const pc=['g','s','b',''];
  document.getElementById('winPodium').innerHTML=sorted.map((t,i)=>{
    const d=TDEF[t.ti];
    return`<div class="pod-row">
      <div class="pod-num ${pc[i]}">${pl[i]}</div>
      <div class="pod-av" style="background:${d.bg};color:${d.color}">${t.name[0].toUpperCase()}</div>
      <div class="pod-name" style="color:${d.color}">${t.name}</div>
      <div class="pod-right"><div class="pod-pts">${t.score}⭐</div><div class="pod-ans">✅${t.correct} ❌${t.wrong}</div></div>
    </div>`;
  }).join('');
  document.getElementById('winScreen').classList.remove('hidden');
  document.getElementById('gameScreen').classList.add('hidden');
}
function doRestart(){
  document.getElementById('winScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('setupScreen').style.display='';
  initSetup();
}
function doClose(){
  if(window.parent&&window.parent!==window){window.parent.postMessage('boardgame:close','*');}
  else{window.location.href='hub.html';}
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
initSetup();
</script>
