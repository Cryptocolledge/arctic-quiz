<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<title>Проектор — Арктический квиз</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<style>
:root{--bg:#020a1a;--accent:#4fdfff;--ok:#61ffb2;--gold:#ffd36b;--text:#f7fbff;--muted:#7a9fc0;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;}
body{font-family:"Segoe UI",system-ui,sans-serif;color:var(--text);display:flex;flex-direction:column;height:100vh;}

/* ТОП-BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:rgba(5,14,34,.95);border-bottom:1px solid rgba(79,223,255,.15);flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.logo{font-size:1.1rem;font-weight:900;letter-spacing:.07em;text-transform:uppercase;background:linear-gradient(90deg,#4fdfff,#61ffb2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.qcounter{font-size:.85rem;color:var(--muted);padding:3px 10px;border-radius:999px;background:rgba(79,223,255,.08);border:1px solid rgba(79,223,255,.2);}
.topbar-right{display:flex;align-items:center;gap:16px;}

/* ПРОГРЕСС */
.progress-bar{height:3px;background:rgba(255,255,255,.06);flex-shrink:0;}
.progress-fill{height:100%;background:linear-gradient(90deg,#4fdfff,#61ffb2);transition:width .4s;}

/* ОСНОВНАЯ ОБЛАСТЬ */
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 5vw;overflow:hidden;}
.question-block{width:100%;max-width:1100px;display:flex;flex-direction:column;gap:28px;}

/* ВОПРОС */
.q-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.q-chip{padding:4px 12px;border-radius:999px;font-size:.85rem;background:rgba(4,14,38,.9);border:1px solid rgba(79,223,255,.6);color:#cff6ff;}
.q-pts{padding:4px 12px;border-radius:999px;font-size:.85rem;font-weight:700;background:rgba(255,211,107,.1);border:1px solid rgba(255,211,107,.4);color:var(--gold);}
.q-diff{padding:4px 10px;border-radius:999px;font-size:.85rem;border:1px solid rgba(255,255,255,.15);color:var(--muted);}
.q-text{font-size:clamp(1.6rem,3.5vw,3rem);line-height:1.25;font-weight:800;color:#f0f8ff;}

/* ИЛЛЮСТРАЦИЯ */
.q-illus{display:flex;flex-direction:column;align-items:center;gap:8px;}
.q-svg-wrap{background:rgba(8,18,40,.8);border:1px solid rgba(79,223,255,.2);border-radius:16px;padding:16px;display:flex;align-items:center;justify-content:center;max-height:260px;}
.q-svg-wrap svg{max-height:220px;width:auto;}
.q-caption{font-size:.85rem;color:var(--muted);font-style:italic;}

/* РЕБУС */
.rebus-box{display:flex;align-items:center;justify-content:center;gap:12px;padding:20px;background:rgba(8,18,40,.8);border:1px solid rgba(255,211,107,.2);border-radius:16px;}
.rpart{font-size:clamp(1.4rem,3vw,2.4rem);font-weight:900;padding:10px 20px;border-radius:12px;background:rgba(255,211,107,.1);border:2px solid rgba(255,211,107,.4);color:var(--gold);letter-spacing:.05em;}
.rop{font-size:1.8rem;font-weight:900;color:var(--muted);}
.r-hint{font-size:.8rem;color:var(--muted);margin-top:4px;text-align:center;}

/* ОТВЕТЫ — показываются только после раскрытия */
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.opt-row{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:14px;background:rgba(8,18,40,.8);border:2px solid rgba(255,255,255,.08);font-size:clamp(.9rem,1.8vw,1.4rem);transition:all .3s;}
.opt-row.correct{border-color:var(--ok);background:rgba(97,255,178,.12);color:var(--ok);}
.opt-letter{width:32px;height:32px;border-radius:8px;border:2px solid rgba(79,223,255,.4);display:flex;align-items:center;justify-content:center;font-size:.95rem;color:var(--accent);flex-shrink:0;font-weight:800;}
.opt-row.correct .opt-letter{border-color:var(--ok);color:var(--ok);}

/* ТАЙМЕР */
.timer-section{display:flex;align-items:center;gap:16px;}
.timer-num{font-size:clamp(2rem,5vw,4.5rem);font-weight:900;min-width:80px;text-align:center;font-variant-numeric:tabular-nums;color:var(--gold);line-height:1;}
.timer-bar-wrap{flex:1;height:14px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;}
.timer-bar{height:100%;border-radius:inherit;transition:width .3s linear;}
.timer-lbl{font-size:.8rem;color:var(--muted);white-space:nowrap;}

/* СТАТУС overlay */
.status-ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,6,20,.96);z-index:50;flex-direction:column;gap:20px;text-align:center;}
.status-icon{font-size:5rem;}
.status-title{font-size:clamp(1.5rem,4vw,3rem);font-weight:900;background:linear-gradient(135deg,#4fdfff,#61ffb2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.status-sub{font-size:1rem;color:var(--muted);max-width:400px;line-height:1.6;}

/* REVEAL баннер */
.reveal-banner{position:fixed;bottom:0;left:0;right:0;padding:16px 28px;text-align:center;font-size:1.1rem;font-weight:800;transform:translateY(100%);transition:transform .4s;}
.reveal-banner.show{transform:translateY(0);}
.reveal-banner.open{background:rgba(97,255,178,.15);border-top:2px solid rgba(97,255,178,.5);color:var(--ok);}

/* Статистика ответивших */
.answered-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:rgba(8,18,40,.8);border-radius:999px;border:1px solid rgba(79,223,255,.2);}
.answered-num{font-size:1rem;font-weight:800;color:#4fdfff;}
.answered-bar-track{width:120px;height:6px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden;}
.answered-bar-fill{height:100%;background:linear-gradient(90deg,#4fdfff,#61ffb2);border-radius:inherit;transition:width .4s;}

/* Лидер */
.leader-chip{padding:4px 12px;border-radius:999px;background:rgba(255,211,107,.1);border:1px solid rgba(255,211,107,.3);font-size:.82rem;color:var(--gold);}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .5s ease forwards;}

/* ── АДАПТИВНОСТЬ ПРОЕКТОРА ── */
@media(max-width:900px){
  .topbar{padding:8px 16px;}
  .q-text{font-size:clamp(1.2rem,4vw,2rem);}
  .opts-grid{grid-template-columns:1fr!important;}
  .opt-row{font-size:clamp(.85rem,2.5vw,1.2rem);}
  .timer-num{font-size:clamp(1.8rem,5vw,3.5rem);}
}
@media(max-width:600px){
  .topbar{flex-direction:column;align-items:flex-start;gap:6px;}
  .topbar-right{flex-wrap:wrap;gap:8px;}
  .main{padding:16px 12px;}
}
</style>
</head>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo" id="projTitle">🧊 Арктический квиз</div>
    <div class="qcounter" id="projChip" style="font-size:.65rem;padding:2px 8px;border-radius:999px;background:rgba(79,223,255,.1);border:1px solid rgba(79,223,255,.25);color:#9fd8f0;letter-spacing:.07em;">АРКТИКА · ГЕОГРАФИЯ</div>
    <div class="qcounter" id="qcounter">Вопрос —</div>

  </div>
  <div class="topbar-right">

<div class="status-ov" id="statusOv">

  <div class="status-sub" id="statusSub">Ожидаем начала игры…</div>
  <div id="statusOnline" style="font-size:.85rem;color:var(--ok);margin-top:4px"></div>
</div>

<!-- MAIN CONTENT -->
<div class="main" id="mainArea" style="display:none">

      </div>
      <!-- Иллюстрация или ребус -->
      <div id="qVisual" style="flex-shrink:0;max-width:340px;display:none"></div>
    </div>

    <!-- Варианты (скрыты до раскрытия) -->
    <div id="optsArea" style="display:none">
      <div style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px" id="optsLabel">Варианты ответа</div>
      <div class="opts-grid" id="optsGrid"></div>
    </div>

    <!-- Таймер -->
    <div class="timer-section" id="timerSection">
      <div style="font-size:.75rem;color:var(--muted);white-space:nowrap;">⏱ ОСТАЛОСЬ</div>
      <div class="timer-num" id="timerNum">—</div>
      <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar" style="width:100%"></div></div>
    </div>

  </div>
</div>

let Q=Q_SPO;

function pts(d){return d<=1?1:d===2?2:3;}

// ── ТАЙМЕР ────────────────────────────────────────────────────
function parseTs(iso){if(!iso)return NaN;let s=String(iso).trim();s=s.replace(" ","T");s=s.replace(/\+00:00$/,"Z");s=s.replace(/\+00$/,"Z");s=s.replace(/(\.\d+)\+00$/,"$1Z");s=s.replace(/(\.\d+)\+00:00$/,"$1Z");const t=Date.parse(s);return isNaN(t)?Date.parse(iso):t;}

function stopTimer(){if(timerInt){clearInterval(timerInt);timerInt=null;}}

function startTimer(at){
  stopTimer();
  const ms=parseTs(at);
  if(isNaN(ms)) return;
  const qt=lastState?.game_timer||QT;
  function tick(){
    const left=Math.max(0,Math.ceil(qt-(Date.now()-ms)/1000));
    $("timerNum").textContent=String(left);
    $("timerBar").style.width=Math.max(0,left/qt*100)+"%";
    const bar=$("timerBar");
    if(left<=5){bar.style.background="linear-gradient(90deg,#ff5f7a,#c0392b)";}
    else if(left<=10){bar.style.background="linear-gradient(90deg,#ffe080,#ffb300)";}
    else{bar.style.background="linear-gradient(90deg,#4fdfff,#ff6ec7)";}
    if(left<=0) stopTimer();
  }
  tick(); timerInt=setInterval(tick,200);
}

// ── РЕНДЕР ВОПРОСА ────────────────────────────────────────────
function renderQ(s){
  const idx=s.current_index;
  const q=Q[Math.max(0,Math.min(Q.length-1,idx))]; if(!q) return;
  const show=s.show_answer===true;
  const qVis=s.question_visible!==false;

  const mainArea=$("mainArea");
  mainArea.style.display="flex";
  $("statusOv").style.display="none";

  // Meta
  const p=pts(q.dif);
  $("qMeta").innerHTML=`<span class="q-chip">${q.tp==="svg"?"Иллюстрация":q.tp==="rebus"?"Ребус":"Вопрос"}</span><span class="q-pts">+${p} очк${p===1?"о":p<5?"а":"ов"}</span><span class="q-diff">${q.dif<=1?"★☆☆":q.dif===2?"★★☆":"★★★"}</span>`;
  $("qcounter").textContent=`Вопрос ${idx+1} / ${Q.length}`;
  $("progFill").style.width=((idx+1)/Q.length*100)+"%";

  // Текст вопроса
  $("qText").textContent=q.q;

  // Визуальный блок
  const vis=$("qVisual"); vis.innerHTML=""; vis.style.display="none";
  if(q.tp==="svg"&&q.svg&&SVG_URLS[q.svg]){
    vis.style.display="";
    vis.innerHTML=`<div class="q-illus"><div class="q-svg-wrap">${SVG_URLS[q.svg]}</div>${q.cap?`<div class="q-caption">${q.cap}</div>`:""}</div>`;
  } else if(q.tp==="rebus"&&q.rp){
    vis.style.display="";
    vis.innerHTML=`<div><div class="rebus-box"><span class="rpart">${q.rp[0]}</span><span class="rop">+</span><span class="rpart">${q.rp[1]}</span></div>${q.rh?`<div class="r-hint">${q.rh}</div>`:""}</div>`;
  }

  // Варианты — показываем всегда, правильный подсвечивается после раскрытия
  const optsArea=$("optsArea");
  optsArea.style.display="";
  $("optsGrid").innerHTML=q.opts.map((o,i)=>{
    const isCorrect = show && i===q.ci;
    return `<div class="opt-row${isCorrect?" correct":""}" style="${!show?"opacity:.92":""}"><div class="opt-letter">${String.fromCharCode(65+i)}</div><div>${o}</div></div>`;
  }).join("");

  // Таймер
  if(s.phase==="running"&&s.question_started_at&&qVis){
    startTimer(s.question_started_at);
  } else if(!qVis){
    stopTimer(); $("timerNum").textContent="🔒"; $("timerBar").style.width="100%";
  } else {
    stopTimer(); $("timerNum").textContent="—";
  }

  // Reveal баннер
  const rb=$("revealBanner");
  if(show){rb.textContent="✅ Ответ раскрыт — см. варианты";rb.className="reveal-banner open show";}
  else{rb.className="reveal-banner";}
}

// ── APPLY STATE ───────────────────────────────────────────────
let lastShow=false;

function applyState(s){
  if(!s){showStatusScreen("⏳","Ожидание","Игра ещё не началась…");return;}
  lastState=s;
  const qmode=s.quiz_mode||"spo";
  Q=qmode==="school"?Q_SCHOOL:Q_SPO;
  if(s.game_timer) QT=s.game_timer;

  const phase=s.phase||"waiting";
  const idx=s.current_index??0;
  const show=s.show_answer===true;
  const rt=s.round_type||"";

  if(phase==="waiting"){showStatusScreen("⏳","Ожидание","Ждём старта игры…");stopTimer();return;}
  if(phase==="ended"){showStatusScreen("🏆","Игра завершена","Благодарим за участие!");stopTimer();return;}
  if(phase==="paused"){
    // Остаёмся на вопросе, показываем паузу
    $("timerNum").textContent="⏸";
    stopTimer(); return;
  }
  const wasSpecialRound = lastRoundType==="blitz_start"||lastRoundType.startsWith("betting");
  lastRoundType = rt;

  if(rt==="blitz_start"||rt==="betting_chips"||rt==="betting_open"||rt==="betting_reveal"){
    showStatusScreen("🎮",rt==="blitz_start"?"Блиц-раунд":"Раунд ставок","Участники отвечают на своих устройствах…");
    stopTimer(); return;
  }

  // Возврат из ставок/блица — принудительно перерисовать вопрос
  if(wasSpecialRound) lastIdx=-1;

  // Новый вопрос
  if(idx!==lastIdx||(show!==lastShow)){
    lastIdx=idx; lastShow=show;
    renderQ(s);
    // Обновляем статистику
    refreshAnsweredCount();
    refreshLeader();
  } else if(s.question_visible===true&&lastState?.question_visible===false){
    renderQ(s);
  }
}

function showStatusScreen(icon,title,sub){
  $("mainArea").style.display="none";
  $("statusOv").style.display="flex";
  $("statusIcon").textContent=icon;
  $("statusTitle").textContent=title;
  $("statusSub").textContent=sub;
  stopTimer();
}

// ── ДАННЫЕ ────────────────────────────────────────────────────
async function refreshAnsweredCount(){
  if(!sb) return;
  try{
    const idx=lastState?.current_index;if(typeof idx!=="number")return;
    const {data:scores}=await sb.from("quiz_scores").select("questions_answered").eq("game_id",GID);
    const {data:players}=await sb.from("quiz_players").select("student_name").eq("game_id",GID);
    const total=players?.length||0;
    const answered=(scores||[]).filter(r=>r.questions_answered>idx).length;
    const bar=$("answeredBar"); bar.style.display="";
    $("answeredNum").textContent=answered+"/"+total;
    $("answeredFill").style.width=(total>0?answered/total*100:0)+"%";
    // Онлайн-счётчик в статус-оверлее
    const online=(players||[]).length;
    $("statusOnline").textContent=online>0?`👥 ${online} участников`:"";
  }catch(e){}
}

async function refreshLeader(){
  if(!sb) return;
  try{
    const {data}=await sb.from("quiz_scores").select("student_name,team_name,score").eq("game_id",GID).order("score",{ascending:false}).limit(1);
    if(data&&data[0]){
      $("leaderChip").style.display="";
      $("leaderName").textContent=(data[0].team_name||data[0].student_name||"—")+" · "+data[0].score;
    }
  }catch(e){}
}

// ── ИНИЦИАЛИЗАЦИЯ ────────────────────────────────────────────
async function init(){
  // Ждём SDK
  let tries=0;
  while(!window.supabase?.createClient&&tries<40){
    await new Promise(r=>setTimeout(r,250)); tries++;
  }
  if(!window.supabase?.createClient){
    $("statusSub").textContent="⚠️ SDK не загружен. Проверьте интернет и обновите страницу."; return;
  }
  sb=window.supabase.createClient(SURL,SKEY);
  // Первый запрос
  try{const{data}=await sb.from("quiz_state").select("*").eq("game_id",GID).maybeSingle();applyState(data);}catch(e){}
  // Поллинг
  setInterval(async()=>{
    try{const{data}=await sb.from("quiz_state").select("*").eq("game_id",GID).maybeSingle();applyState(data);}catch(e){}
  },1000);
  setInterval(()=>{if(lastState?.phase==="running"){refreshAnsweredCount();refreshLeader();}},3000);
}

// Полноэкранный режим по клику
document.addEventListener("click",()=>{
  if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
});
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"&&document.fullscreenElement) document.exitFullscreen?.();
  if(e.key==="f"||e.key==="F") document.documentElement.requestFullscreen?.();
});

init();
</script>
